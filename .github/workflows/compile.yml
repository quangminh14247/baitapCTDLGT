name: Compile All C and C++ Files and Push to Repo

on: [push, workflow_dispatch]

# Cấp quyền cho máy ảo được phép ghi/đẩy file vào repo của bạn
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile all C and C++ files
        shell: powershell
        run: |
          # Quét cả file .c và .cpp trong toàn bộ thư mục (bao gồm cả thư mục con)
          Get-ChildItem -Include *.c, *.cpp -Recurse | ForEach-Object {
              $name = $_.BaseName
              $ext = $_.Extension
              
              if ($ext -eq ".cpp") {
                  # Nếu là file C++, dùng g++ để compile
                  echo "Compiling C++ file: $_.Name"
                  g++ $_.FullName -o "$name.exe"
              } else {
                  # Nếu là file C, dùng gcc để compile
                  echo "Compiling C file: $_.Name"
                  gcc $_.FullName -o "$name.exe"
              }
          }

      # Bước: Tự động gom các file .exe vừa tạo và commit thẳng vào repo
      - name: Commit and Push EXE files
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Thêm tất cả file .exe vào hàng đợi commit
          git add *.exe
          
          # Kiểm tra xem có file .exe nào mới hoặc có thay đổi không, nếu có thì mới commit
          if git diff-index --quiet HEAD; then
            echo "No changes to commit"
          else
            git commit -m "Automated compile: Updated EXE files (C/C++)"
            git push
          fi